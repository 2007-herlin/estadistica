<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEA - Reportes</title>
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Hojas de estilos -->
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS Client library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar se inyecta dinámicamente aquí -->
        <main class="main-content">
            <!-- Header se inyecta dinámicamente aquí -->
            <div class="view-container">
                
                <div class="charts-grid">
                    <div class="chart-card" style="grid-column: span 2;">
                        <div class="chart-header">
                            <h3>Resumen Mensual de Ventas & Utilidades</h3>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Mes</th>
                                    <th>Nº Transacciones</th>
                                    <th>Ingreso Bruto</th>
                                    <th>Utilidad Bruta Est.</th>
                                    <th>Ticket Promedio</th>
                                </tr>
                            </thead>
                            <tbody id="reporte-ventas-mensuales-body">
                                <!-- Dinámico -->
                            </tbody>
                        </table>
                    </div>

                    <div class="chart-card">
                        <div class="chart-header">
                            <h3>Rendimiento por Categoría</h3>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Categoría</th>
                                    <th>U. Vendidas</th>
                                    <th>Recaudación</th>
                                </tr>
                            </thead>
                            <tbody id="reporte-categoria-ventas-body">
                                <!-- Dinámico -->
                            </tbody>
                        </table>
                    </div>

                    <div class="chart-card">
                        <div class="chart-header">
                            <h3>Top 5 Clientes Más Frecuentes</h3>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Cliente</th>
                                    <th>Compras</th>
                                    <th>Inversión Total</th>
                                </tr>
                            </thead>
                            <tbody id="reporte-clientes-vip-body">
                                <!-- Dinámico -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- CARGA DE SCRIPTS -->
    <script src="database.js?v=1.0.2"></script>
    <script src="layout.js?v=1.0.2"></script>
    <script src="js/reportes.js?v=1.0.2"></script>
</body>
</html>
