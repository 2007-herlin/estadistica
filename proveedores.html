<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEA - Proveedores</title>
    <!-- FontAwesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Hojas de estilos -->
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS Client library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar se inyecta dinámicamente aquí -->
        <main class="main-content">
            <!-- Header se inyecta dinámicamente aquí -->
            <div class="view-container">
                
                <div class="data-table-container">
                    <div class="table-toolbar">
                        <span class="table-title">Directorio de Proveedores</span>
                        <div class="table-actions">
                            <div class="search-input-wrapper">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input type="text" id="proveedores-search" class="search-input" placeholder="Buscar proveedor...">
                            </div>
                            <button class="btn btn-primary" id="btn-proveedor-nuevo">
                                <i class="fa-solid fa-plus"></i> Nuevo Proveedor
                            </button>
                        </div>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>RUC</th>
                                <th>Razón Social</th>
                                <th>Contacto</th>
                                <th>Teléfono</th>
                                <th>Correo</th>
                                <th>Dirección</th>
                                <th style="width:120px;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="proveedores-table-body">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>

    <!-- MODAL CRUD DE PROVEEDORES -->
    <div class="modal-overlay" id="modal-proveedor">
        <div class="modal-panel">
            <div class="modal-header">
                <h3 id="modal-proveedor-title">Registrar Proveedor</h3>
                <button class="modal-close" id="btn-modal-proveedor-close">&times;</button>
            </div>
            <form id="form-proveedor">
                <input type="hidden" id="proveedor-id">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="proveedor-ruc">RUC (11 dígitos)</label>
                            <input type="text" id="proveedor-ruc" class="form-control" required placeholder="Número RUC">
                        </div>
                        <div class="form-group">
                            <label for="proveedor-razon">Razón Social</label>
                            <input type="text" id="proveedor-razon" class="form-control" required placeholder="Nombre legal de empresa">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="proveedor-contacto">Contacto Comercial</label>
                            <input type="text" id="proveedor-contacto" class="form-control" placeholder="Nombre de ejecutivo">
                        </div>
                        <div class="form-group">
                            <label for="proveedor-telefono">Teléfono</label>
                            <input type="text" id="proveedor-telefono" class="form-control" placeholder="Ej. 01-445566">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="proveedor-correo">Correo electrónico</label>
                        <input type="email" id="proveedor-correo" class="form-control" placeholder="ventas@proveedor.com">
                    </div>
                    <div class="form-group">
                        <label for="proveedor-direccion">Dirección Fiscal</label>
                        <input type="text" id="proveedor-direccion" class="form-control" placeholder="Dirección completa">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-modal-proveedor-cancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Proveedor</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CARGA DE SCRIPTS -->
    <script src="database.js"></script>
    <script src="layout.js"></script>
    <script src="js/proveedores.js"></script>
</body>
</html>
